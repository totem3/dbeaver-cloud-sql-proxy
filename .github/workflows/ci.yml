name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      - name: Build
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: dbeaver-cloud-sql-proxy-driver
          path: build/dbeaver-cloud-sql-proxy-driver.jar
